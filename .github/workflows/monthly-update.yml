name: Monthly living update

on:
  schedule:
    - cron: "30 6 1 * *"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you triggering this manually?"
        required: false
        default: "ad-hoc update"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  refresh-corpus:
    name: Re-search & stage screening queue
    runs-on: ubuntu-latest
    outputs:
      run_date:    ${{ steps.summarise.outputs.run_date }}
      new_records: ${{ steps.summarise.outputs.new_records }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::metafor
            any::dplyr
            any::tidyr
            any::readr
            any::stringr
            any::purrr
            any::ggplot2
            any::knitr
            any::yaml
            any::jsonlite
            any::fs
            any::tibble
            any::rentrez
            any::xml2
            any::rmarkdown
            any::httr2
            any::pdftools

      - name: Run search
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: Rscript R/01_search.R

      - name: Build screening queue
        run: Rscript R/02_screen.R

      - id: summarise
        run: |
          run_date=$(date -u +%F)
          echo "run_date=$run_date" >> "$GITHUB_OUTPUT"
          q="data/screening_queue_${run_date}.csv"
          if [[ -f "$q" ]]; then n=$(($(wc -l < "$q") - 1)); else n=0; fi
          echo "new_records=$n" >> "$GITHUB_OUTPUT"
          echo "## Search update — $run_date" >> "$GITHUB_STEP_SUMMARY"
          echo "* New candidate records: $n"   >> "$GITHUB_STEP_SUMMARY"

      - name: Commit search artefacts
        run: |
          git config user.name  "living-review-bot"
          git config user.email "living-review-bot@users.noreply.github.com"
          git add data/raw_records_*.csv data/screening_log.csv \
                  data/screening_queue_*.csv search/update_log.md 2>/dev/null || true
          git commit -m "search: monthly update ${{ steps.summarise.outputs.run_date }}" || \
            echo "no changes to commit"
          git push || echo "nothing to push"

  ai-batch:
    name: AI screen + fetch + extract → open PR
    needs: refresh-corpus
    runs-on: ubuntu-latest
    if: ${{ needs.refresh-corpus.outputs.new_records != '0' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.1"
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::metafor
            any::dplyr
            any::tidyr
            any::readr
            any::stringr
            any::purrr
            any::ggplot2
            any::knitr
            any::yaml
            any::jsonlite
            any::fs
            any::tibble
            any::rentrez
            any::xml2
            any::rmarkdown
            any::httr2
            any::pdftools

      - name: AI title/abstract screen
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: Rscript R/02b_ai_screen.R

      - name: Fetch open-access full text
        env:
          UNPAYWALL_EMAIL: ${{ secrets.UNPAYWALL_EMAIL }}
        run: Rscript R/03a_fetch_fulltext.R

      - name: AI extract + draft ROBINS-E
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: Rscript R/03b_ai_extract.R

      - name: Open PR with AI batch
        uses: peter-evans/create-pull-request@v6
        with:
          branch: ai-batch/${{ needs.refresh-corpus.outputs.run_date }}
          base: main
          title: "AI batch — ${{ needs.refresh-corpus.outputs.run_date }}"
          commit-message: "AI batch: screen + fetch + extract for ${{ needs.refresh-corpus.outputs.run_date }}"
          author: "living-review-bot <living-review-bot@users.noreply.github.com>"
          committer: "living-review-bot <living-review-bot@users.noreply.github.com>"
          delete-branch: true
          add-paths: |
            data/screening_queue_*_ai.csv
            data/fulltext_log_*.csv
            data/fulltext/**
            data/ai_extracted_*.csv
            data/extracted.csv
          body: |
            **Automated AI batch for ${{ needs.refresh-corpus.outputs.run_date }}**

            This PR contains the AI second-screener verdicts, the open-access
            full texts that were fetchable, and Claude Haiku 4.5's draft
            extractions + ROBINS-E ratings for the new records.

            ### Your review checklist

            - [ ] Open `data/screening_queue_*_ai.csv` and skim the `ai_decision`
                  + `ai_reason` columns. Confirm or override the includes/unsures.
                  Spot-check ~20 % of the excludes.
            - [ ] Open `data/fulltext_log_*.csv`. For records with
                  `fetch_status = not_fetched`, drop the PDF into
                  `data/fulltext/<pmid>.pdf` if you have institutional access,
                  then re-run the workflow once.
            - [ ] Open the **diff of `data/extracted.csv`** in this PR. Each new
                  row has `ai_verbatim_quote` (the exact sentence Claude pulled
                  the effect estimate from) and `ai_confidence`. For each row,
                  click the linked PDF and verify the verbatim quote against the
                  paper's text. Edit the row inline in the GitHub UI if needed.
            - [ ] Confirm the `rob_overall` column on each new row, with the
                  `ai_rob_rationale` audit field.

            When the diff looks right, **Squash and merge** this PR. The
            `re-render` workflow will fire on the merge commit and rebuild the
            live site within a few minutes.

            Cost on this batch: ≈ \$0.01 per AI-screened record + ≈ \$0.02 per
            full-text extraction. Audit log: `data/ai_extracted_*.csv`.
